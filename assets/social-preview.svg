<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="viteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BD34FE"/>
      <stop offset="100%" style="stop-color:#41D1FF"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BD34FE;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#BD34FE"/>
      <stop offset="80%" style="stop-color:#41D1FF"/>
      <stop offset="100%" style="stop-color:#41D1FF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="120" r="200" fill="#BD34FE" opacity="0.05"/>
  <circle cx="180" cy="520" r="150" fill="#41D1FF" opacity="0.04"/>

  <!-- Vite Lightning Bolt Icon (simplified) -->
  <g transform="translate(540, 80)">
    <polygon points="120,0 40,140 100,140 80,240 160,100 100,100" fill="url(#viteGrad)" opacity="0.9"/>
  </g>

  <!-- Main Title -->
  <text x="640" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">
    Vite Claude Skill Package
  </text>

  <!-- Accent line -->
  <rect x="290" y="395" width="700" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Subtitle -->
  <text x="640" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#a0aec0" text-anchor="middle">
    22 Deterministic Skills for Vite 6, 7 &amp; 8
  </text>

  <!-- Badges row -->
  <!-- Claude Code badge -->
  <rect x="300" y="475" width="160" height="32" rx="6" fill="#2563eb" opacity="0.8"/>
  <text x="380" y="496" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Claude Code Ready</text>

  <!-- Skills badge -->
  <rect x="480" y="475" width="120" height="32" rx="6" fill="#BD34FE" opacity="0.7"/>
  <text x="540" y="496" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">22 Skills</text>

  <!-- TypeScript badge -->
  <rect x="620" y="475" width="140" height="32" rx="6" fill="#3178C6" opacity="0.7"/>
  <text x="690" y="496" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">TS + JS</text>

  <!-- MIT badge -->
  <rect x="780" y="475" width="100" height="32" rx="6" fill="#059669" opacity="0.7"/>
  <text x="830" y="496" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">MIT</text>

  <!-- Bottom: OpenAEC Foundation -->
  <text x="640" y="580" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#64748b" text-anchor="middle">
    OpenAEC Foundation
  </text>

  <!-- Bottom accent -->
  <rect x="0" y="632" width="1280" height="8" fill="url(#accentLine)"/>
</svg>
